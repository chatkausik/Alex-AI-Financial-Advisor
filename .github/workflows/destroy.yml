name: Destroy Alex

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options: [dev, test, prod]
      confirm:
        description: "Type the environment name to confirm (e.g. dev)"
        required: true
        type: string

permissions:
  contents: read

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "us-east-1"

jobs:
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation matches environment
        run: |
          if [ "${{ inputs.confirm }}" != "${{ inputs.environment }}" ]; then
            echo "❌ Confirmation '${{ inputs.confirm }}' does not match environment '${{ inputs.environment }}'"
            exit 1
          fi
          echo "✅ Confirmation matches — proceeding with destroy"

  destroy:
    name: Terraform Destroy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Get AWS Account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Empty frontend S3 bucket before destroy
        run: |
          BUCKET="alex-${{ inputs.environment }}-frontend-${{ steps.account.outputs.id }}"
          aws s3 rm s3://${BUCKET}/ --recursive || true

      - name: Empty Lambda packages S3 bucket before destroy
        run: |
          BUCKET="alex-${{ inputs.environment }}-lambda-packages-${{ steps.account.outputs.id }}"
          aws s3 rm s3://${BUCKET}/ --recursive || true

      - name: Empty vector S3 bucket before destroy
        run: |
          BUCKET="alex-${{ inputs.environment }}-vectors-${{ steps.account.outputs.id }}"
          aws s3 rm s3://${BUCKET}/ --recursive || true

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=alex-terraform-state-${{ steps.account.outputs.id }}" \
            -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=alex-terraform-locks"

      - name: Terraform Destroy Plan
        working-directory: infra
        env:
          TF_VAR_openai_api_key:      ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_polygon_api_key:     ${{ secrets.POLYGON_API_KEY }}
          TF_VAR_clerk_jwks_url:      ${{ secrets.CLERK_JWKS_URL }}
          TF_VAR_clerk_issuer:        ${{ secrets.CLERK_ISSUER }}
          TF_VAR_langfuse_public_key: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          TF_VAR_langfuse_secret_key: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: |
          terraform plan -destroy \
            -var-file="environments/${{ inputs.environment }}.tfvars" \
            -out=destroy-plan

      - name: Terraform Destroy
        working-directory: infra
        env:
          TF_VAR_openai_api_key:      ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_polygon_api_key:     ${{ secrets.POLYGON_API_KEY }}
          TF_VAR_clerk_jwks_url:      ${{ secrets.CLERK_JWKS_URL }}
          TF_VAR_clerk_issuer:        ${{ secrets.CLERK_ISSUER }}
          TF_VAR_langfuse_public_key: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          TF_VAR_langfuse_secret_key: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: terraform apply -auto-approve destroy-plan

      - name: Destroy complete
        run: echo "🗑️  Alex ${{ inputs.environment }} infrastructure destroyed"
